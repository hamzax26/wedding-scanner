<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Wedding Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:350px;
  background:white;
  padding:30px;
  border-radius:25px;
  box-shadow:0 0 25px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  margin-bottom:25px;
}

#reader{
  width:100%;
  border-radius:20px;
  overflow:hidden;
}

.result{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  font-size:24px;
  font-weight:bold;
  display:none;
  line-height:1.8;
}

.success{
  background:#e7ffe7;
  color:green;
}

.error{
  background:#ffe7e7;
  color:red;
}

.info{
  margin-top:15px;
  color:#666;
  font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<h1>📷 مسح الدعوات</h1>

<div id="reader"></div>

<div class="info">
وجّه الكاميرا على QR
</div>

<div id="result" class="result"></div>

</div>

<script>

const resultDiv = document.getElementById("result");

// أصوات
const successSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
const errorSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");

function onScanSuccess(decodedText) {

  html5QrCode.pause();

  // استخراج الكود
  const url = new URL(decodedText);
  const code = url.searchParams.get("code");

  // شاشة الانتظار
  resultDiv.style.display = "block";
  resultDiv.className = "result";
  resultDiv.innerHTML = `
    ⏳
    <br><br>
    جاري التحقق...
    <br><br>
    ${code}
  `;

  fetch(decodedText)
    .then(res => res.text())
    .then(data => {

      // صالح
      if(data.includes("صالحة")){

        successSound.play();

        resultDiv.className = "result success";

        resultDiv.innerHTML = `
          ✅
          <br><br>
          الدعوة صالحة
          <br><br>

          رقم الدعوة:
          <br>
          <b>${code}</b>

          <br><br>

          حالة الدعوة:
          <br>
          صالحة
        `;

      }

      // مستخدمة
      else if(data.includes("مستخدمة")){

        errorSound.play();

        resultDiv.className = "result error";

        resultDiv.innerHTML = `
          ❌
          <br><br>
          مستخدمة مسبقًا
          <br><br>

          رقم الدعوة:
          <br>
          <b>${code}</b>

          <br><br>

          حالة الدعوة:
          <br>
          مستخدمة
        `;

      }

      // خطأ
      else{

        errorSound.play();

        resultDiv.className = "result error";

        resultDiv.innerHTML = `
          ⚠️
          <br><br>
          خطأ في التحقق
        `;

      }

      // يرجع للمسح
      setTimeout(() => {

        resultDiv.style.display = "none";

        html5QrCode.resume();

      }, 3500);

    });

}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

  if (devices && devices.length) {

    const backCamera =
      devices.find(d =>
        d.label.toLowerCase().includes('back')
      )?.id || devices[0].id;

    html5QrCode.start(
      backCamera,
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );

  }

});

</script>

</body>
</html>
