<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Wedding Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:350px;
  background:white;
  padding:30px;
  border-radius:25px;
  box-shadow:0 0 25px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  margin-bottom:25px;
}

#reader{
  width:100%;
  border-radius:20px;
  overflow:hidden;
}

.result{
  margin-top:20px;
  padding:20px;
  border-radius:18px;
  font-size:22px;
  font-weight:bold;
  display:none;
}

.success{
  background:#e7ffe7;
  color:green;
}

.error{
  background:#ffe7e7;
  color:red;
}

.info{
  margin-top:15px;
  color:#666;
}

</style>
</head>

<body>

<div class="box">

<h1>📷 مسح الدعوات</h1>

<div id="reader"></div>

<div class="info">
وجّه الكاميرا على QR
</div>

<div id="result" class="result"></div>

</div>

<script>

const resultDiv = document.getElementById("result");

function onScanSuccess(decodedText) {

  html5QrCode.pause();

  fetch(decodedText)
    .then(res => res.text())
    .then(data => {

      resultDiv.style.display = "block";

      if(data.includes("صالحة")){

        resultDiv.className = "result success";
        resultDiv.innerHTML = "✅ الدعوة صالحة";

      } else if(data.includes("مستخدمة")) {

        resultDiv.className = "result error";
        resultDiv.innerHTML = "❌ مستخدمة مسبقًا";

      } else {

        resultDiv.className = "result error";
        resultDiv.innerHTML = "⚠️ خطأ في التحقق";

      }

      setTimeout(() => {

        resultDiv.style.display = "none";

        html5QrCode.resume();

      }, 3000);

    });

}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

  if (devices && devices.length) {

    const backCamera =
      devices.find(d =>
        d.label.toLowerCase().includes('back')
      )?.id || devices[0].id;

    html5QrCode.start(
      backCamera,
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );

  }

});

</script>

</body>
</html>
