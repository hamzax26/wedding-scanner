<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:
  linear-gradient(135deg,#0f172a,#111827,#1e293b);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:430px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:30px;
  padding:25px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  font-size:55px;
  margin-bottom:10px;
}

.title{
  font-size:30px;
  font-weight:bold;
}

.subtitle{
  margin-top:8px;
  color:#cbd5e1;
  font-size:16px;
}

#reader{
  overflow:hidden;
  border-radius:25px;
  border:3px solid rgba(255,255,255,0.1);
}

.scan-status{
  margin-top:18px;
  text-align:center;
  color:#cbd5e1;
  font-size:16px;
}

.result-overlay{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.result-card{
  width:100%;
  max-width:420px;
  border-radius:35px;
  padding:35px 25px;
  text-align:center;
  color:white;
  animation:pop .2s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
}

@keyframes pop{
  from{
    transform:scale(.9);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.success-bg{
  background:linear-gradient(135deg,#16a34a,#22c55e);
}

.error-bg{
  background:linear-gradient(135deg,#dc2626,#ef4444);
}

.loading-bg{
  background:linear-gradient(135deg,#334155,#475569);
}

.icon{
  font-size:90px;
  margin-bottom:15px;
}

.main-text{
  font-size:32px;
  font-weight:bold;
  margin-bottom:20px;
}

.info-box{
  background:rgba(255,255,255,0.14);
  border-radius:20px;
  padding:18px;
  margin-top:12px;
}

.label{
  font-size:15px;
  opacity:.9;
}

.value{
  font-size:26px;
  font-weight:bold;
  margin-top:5px;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:#94a3b8;
  font-size:14px;
}

</style>

</head>

<body>

<div class="container">

  <div class="card">

    <div class="header">

      <div class="logo">💍</div>

      <div class="title">
        Wedding Scanner
      </div>

      <div class="subtitle">
        امسح الدعوة للتحقق
      </div>

    </div>

    <div id="reader"></div>

    <div class="scan-status">
      📷 الكاميرا الخلفية تعمل
    </div>

  </div>

  <div class="footer">
    QR Invitation Verification
  </div>

</div>

<div class="result-overlay" id="overlay">

  <div class="result-card loading-bg" id="resultCard">

    <div class="icon" id="icon">
      ⏳
    </div>

    <div class="main-text" id="mainText">
      جاري التحقق...
    </div>

    <div class="info-box">

      <div class="label">
        رقم الدعوة
      </div>

      <div class="value" id="inviteCode">
        ...
      </div>

    </div>

    <div class="info-box">

      <div class="label">
        حالة الدعوة
      </div>

      <div class="value" id="inviteStatus">
        ...
      </div>

    </div>

  </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw_GCFnvSDJz_p5qIXwJzFiexETdYtIPqY017EFhDrxKmdoXBzzbNVhms-K09tDr7l-/exec";

const overlay = document.getElementById("overlay");
const resultCard = document.getElementById("resultCard");
const icon = document.getElementById("icon");
const mainText = document.getElementById("mainText");
const inviteCode = document.getElementById("inviteCode");
const inviteStatus = document.getElementById("inviteStatus");

const successSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
const errorSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3");

let processing = false;

async function onScanSuccess(decodedText){

  if(processing) return;

  processing = true;

  html5QrCode.pause();

  // الآن QR يحتوي فقط الكود
  const code = decodedText.trim();

  overlay.style.display = "flex";

  resultCard.className = "result-card loading-bg";

  icon.innerHTML = "⏳";

  mainText.innerHTML = "جاري التحقق...";

  inviteCode.innerHTML = code;

  inviteStatus.innerHTML = "انتظر";

  try{

    const response = await fetch(
      API_URL + "?code=" + code
    );

    const data = await response.text();

    // صالح
    if(data.includes("OK")){

      navigator.vibrate?.(150);

      successSound.play();

      resultCard.className = "result-card success-bg";

      icon.innerHTML = "✅";

      mainText.innerHTML = "الدعوة صالحة";

      inviteStatus.innerHTML = "صالحة";

    }

    // مستخدمة
    else if(data.includes("USED")){

      navigator.vibrate?.([120,80,120]);

      errorSound.play();

      resultCard.className = "result-card error-bg";

      icon.innerHTML = "❌";

      mainText.innerHTML = "مستخدمة مسبقًا";

      inviteStatus.innerHTML = "مستخدمة";

    }

    // غير موجودة
    else{

      navigator.vibrate?.([120,80,120]);

      errorSound.play();

      resultCard.className = "result-card error-bg";

      icon.innerHTML = "⚠️";

      mainText.innerHTML = "دعوة غير موجودة";

      inviteStatus.innerHTML = "خطأ";

    }

  }catch(err){

    errorSound.play();

    resultCard.className = "result-card error-bg";

    icon.innerHTML = "⚠️";

    mainText.innerHTML = "خطأ بالاتصال";

    inviteStatus.innerHTML = "تعذر التحقق";

  }

  setTimeout(()=>{

    overlay.style.display = "none";

    html5QrCode.resume();

    processing = false;

  },1800);

}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{

  if(devices && devices.length){

    const backCamera =
      devices.find(d =>
        d.label.toLowerCase().includes("back")
      )?.id || devices[0].id;

    html5QrCode.start(
      backCamera,
      {
        fps:30,
        qrbox:{width:180,height:180}
      },
      onScanSuccess
    );

  }

});

</script>

</body>
</html>
